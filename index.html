<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuaca GPS - Lokasi Real-time</title>
  <style>
    :root { --primary: #4a9eff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #74b9ff, #0984e3);
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 650px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    header { 
      background: var(--primary); 
      color: white; 
      padding: 20px; 
      text-align: center; 
    }
    .content { padding: 25px; }
    button {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 8px 5px;
    }
    #btnLokasi { 
      background: #00b894; 
      color: white; 
      width: 100%; 
      font-weight: bold; 
    }
    .search { 
      display: flex; 
      gap: 10px; 
      margin: 20px 0; 
    }
    input { 
      flex: 1; 
      padding: 14px; 
      border: 2px solid #ddd; 
      border-radius: 10px; 
      font-size: 1rem; 
    }
    #btnCari { 
      background: var(--primary); 
      color: white; 
    }
    select { 
      padding: 12px; 
      border-radius: 10px; 
      border: 2px solid #ddd; 
    }
    #cuaca {
      margin-top: 20px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 15px;
      text-align: center;
    }
    .temp { 
      font-size: 3.8rem; 
      font-weight: bold; 
      margin: 10px 0; 
    }
    .info { 
      font-size: 0.9rem; 
      color: #666; 
      margin-top: 15px; 
    }
    .loading { 
      padding: 20px; 
      color: #0984e3; 
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌤️ Cuaca GPS</h1>
      <p>Lokasi Real-time • Multiple Sumber</p>
    </header>

    <div class="content">
      <button id="btnLokasi">📍 Gunakan Lokasi Saya</button>

      <div class="search">
        <input type="text" id="inputLokasi" placeholder="Cari kota... (contoh: Sragen)">
        <button id="btnCari">Cari</button>
      </div>

      <div style="margin:15px 0;">
        <label>Sumber Cuaca: </label>
        <select id="apiSource">
          <option value="openmeteo">Open-Meteo (Default)</option>
          <option value="openweather">OpenWeatherMap (Lebih Akurat)</option>
        </select>
      </div>

      <div id="infoKoordinat" class="info"></div>
      <div id="cuaca"></div>
    </div>
  </div>

  <script>
    // API Key OpenWeatherMap
    const OPENWEATHER_API_KEY = "638ec73e06351523be4d9f386a99e8f8";

    const btnLokasi = document.getElementById('btnLokasi');
    const btnCari = document.getElementById('btnCari');
    const inputLokasi = document.getElementById('inputLokasi');
    const cuacaDiv = document.getElementById('cuaca');
    const infoKoordinat = document.getElementById('infoKoordinat');
    const apiSource = document.getElementById('apiSource');

    const weatherDesc = {
      0: "☀️ Cerah", 1:"⛅ Cerah Berawan", 2:"⛅ Berawan", 3:"☁️ Mendung",
      45:"🌫️ Kabut", 51:"🌧️ Hujan Ringan", 61:"🌧️ Hujan", 63:"🌧️ Hujan Sedang",
      71:"❄️ Salju", 80:"🌦️ Hujan Lokal", 95:"⛈️ Badai Petir"
    };

    async function ambilCuaca(lat, lon, namaLokasi = '') {
      cuacaDiv.innerHTML = `<div class="loading">⏳ Mengambil data cuaca...</div>`;
      const source = apiSource.value;

      try {
        let suhu, terasa, kelembaban, angin, deskripsi;

        if (source === "openmeteo") {
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`);
          const data = await res.json();
          const current = data.current;
          
          suhu = current.temperature_2m;
          terasa = current.apparent_temperature;
          kelembaban = current.relative_humidity_2m;
          angin = current.wind_speed_10m;
          deskripsi = weatherDesc[current.weather_code] || "Cuaca Tidak Diketahui";
        } 
        else {
          // OpenWeatherMap
          const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${OPENWEATHER_API_KEY}&units=metric&lang=id`);
          const data = await res.json();
          
          suhu = data.main.temp;
          terasa = data.main.feels_like;
          kelembaban = data.main.humidity;
          angin = (data.wind?.speed || 0) * 3.6; // m/s → km/h
          deskripsi = data.weather[0].description;
        }

        cuacaDiv.innerHTML = `
          <h2>${namaLokasi || 'Lokasi Saat Ini'}</h2>
          <div class="temp">${Math.round(suhu)}°C</div>
          <p style="font-size:1.3rem; margin:8px 0;">${deskripsi}</p>
          <p><strong>Terasa seperti:</strong> ${Math.round(terasa)}°C</p>
          <p><strong>Kelembaban:</strong> ${kelembaban}%</p>
          <p><strong>Angin:</strong> ${angin.toFixed(1)} km/jam</p>
          <div class="info">
            Koordinat: ${lat.toFixed(4)}, ${lon.toFixed(4)} • ${source === "openweather" ? "OpenWeatherMap" : "Open-Meteo"}
          </div>
        `;
      } catch (err) {
        cuacaDiv.innerHTML = `<p style="color:red;">❌ Gagal mengambil data cuaca. Coba ganti sumber.</p>`;
        console.error(err);
      }
    }

    // Gunakan Lokasi GPS
    btnLokasi.addEventListener('click', () => {
      if (!navigator.geolocation) return alert("Browser tidak mendukung GPS");
      
      btnLokasi.textContent = "📍 Mencari lokasi...";
      
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        infoKoordinat.textContent = `Lokasi Anda: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
        ambilCuaca(latitude, longitude, "Lokasi Anda Saat Ini");
        btnLokasi.textContent = "📍 Gunakan Lokasi Saya";
      }, () => {
        alert("Gagal mendapatkan lokasi. Pastikan izin GPS diizinkan.");
        btnLokasi.textContent = "📍 Gunakan Lokasi Saya";
      });
    });

    // Cari berdasarkan nama lokasi
    btnCari.addEventListener('click', async () => {
      const query = inputLokasi.value.trim();
      if (!query) return alert("Masukkan nama kota atau alamat!");

      cuacaDiv.innerHTML = `<div class="loading">🔍 Mencari ${query}...</div>`;

      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
        const data = await res.json();

        if (data && data.length > 0) {
          const { lat, lon, display_name } = data[0];
          infoKoordinat.innerHTML = `📍 ${display_name}`;
          ambilCuaca(parseFloat(lat), parseFloat(lon), display_name);
        } else {
          cuacaDiv.innerHTML = `<p style="color:orange;">Lokasi tidak ditemukan.</p>`;
        }
      } catch (e) {
        cuacaDiv.innerHTML = `<p style="color:red;">Gagal mencari lokasi.</p>`;
      }
    });

    inputLokasi.addEventListener('keypress', e => {
      if (e.key === 'Enter') btnCari.click();
    });
  </script>
</body>
</html>
