<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuaca GPS - Lokasi Real-time</title>
  <style>
    :root {
      --primary: #4a9eff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #74b9ff, #0984e3);
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 650px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    header {
      background: var(--primary);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .content {
      padding: 25px;
    }
    button {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 8px 5px;
    }
    #btnLokasi {
      background: #00b894;
      color: white;
      width: 100%;
      font-weight: bold;
    }
    .search {
      display: flex;
      gap: 10px;
      margin: 20px 0;
    }
    input {
      flex: 1;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
    }
    #btnCari {
      background: var(--primary);
      color: white;
    }
    #cuaca {
      margin-top: 20px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 15px;
      text-align: center;
    }
    .info {
      font-size: 0.9rem;
      color: #666;
      margin-top: 10px;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #0984e3;
    }
    h1 { font-size: 2rem; margin-bottom: 5px; }
    .temp { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌤️ Cuaca GPS</h1>
      <p>Lihat cuaca sesuai lokasi Anda</p>
    </header>

    <div class="content">
      <button id="btnLokasi">📍 Gunakan Lokasi Saya Saat Ini</button>

      <div class="search">
        <input type="text" id="inputLokasi" placeholder="Cari kota atau alamat... (contoh: Bandung)">
        <button id="btnCari">Cari</button>
      </div>

      <div id="infoKoordinat" class="info"></div>
      <div id="cuaca"></div>
    </div>
  </div>

  <script>
    const btnLokasi = document.getElementById('btnLokasi');
    const btnCari = document.getElementById('btnCari');
    const inputLokasi = document.getElementById('inputLokasi');
    const cuacaDiv = document.getElementById('cuaca');
    const infoKoordinat = document.getElementById('infoKoordinat');

    // Weather Code Description (Open-Meteo WMO)
    const weatherDesc = {
      0: "☀️ Cerah", 1: "⛅ Cerah Berawan", 2: "⛅ Berawan", 3: "☁️ Mendung",
      45: "🌫️ Kabut", 48: "🌫️ Kabut Beku",
      51: "🌧️ Hujan Ringan", 53: "🌧️ Hujan Ringan", 55: "🌧️ Hujan Sedang",
      61: "🌧️ Hujan", 63: "🌧️ Hujan Sedang", 65: "🌧️ Hujan Lebat",
      71: "❄️ Salju Ringan", 73: "❄️ Salju", 75: "❄️ Salju Lebat",
      80: "🌦️ Hujan Lokal", 81: "🌧️ Hujan Lokal", 82: "⛈️ Hujan Lebat Lokal",
      95: "⛈️ Badai Petir", 96: "⛈️ Badai Petir dengan Hujan Es", 99: "⛈️ Badai Petir Hebat"
    };

    async function ambilCuaca(lat, lon, namaLokasi = '') {
      cuacaDiv.innerHTML = `<div class="loading">⏳ Mengambil data cuaca...</div>`;

      try {
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
          `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m` +
          `&timezone=auto`
        );
        
        const data = await res.json();
        const current = data.current;

        const desc = weatherDesc[current.weather_code] || "Cuaca Tidak Diketahui";

        cuacaDiv.innerHTML = `
          <h2>${namaLokasi || 'Lokasi Saat Ini'}</h2>
          <div class="temp">${current.temperature_2m}°C</div>
          <p style="font-size:1.3rem; margin:10px 0;">${desc}</p>
          
          <p><strong>Terasa seperti:</strong> ${current.apparent_temperature}°C</p>
          <p><strong>Kelembaban:</strong> ${current.relative_humidity_2m}%</p>
          <p><strong>Angin:</strong> ${current.wind_speed_10m} km/jam</p>
          
          <div class="info">
            Koordinat: ${lat.toFixed(4)}, ${lon.toFixed(4)}
          </div>
        `;
      } catch (err) {
        cuacaDiv.innerHTML = `<p style="color:red;">❌ Gagal mengambil data cuaca. Coba lagi.</p>`;
      }
    }

    // Gunakan Lokasi GPS
    btnLokasi.addEventListener('click', () => {
      if (!navigator.geolocation) {
        alert("Browser Anda tidak mendukung GPS.");
        return;
      }

      btnLokasi.textContent = "📍 Mencari lokasi...";
      
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          
          infoKoordinat.textContent = `Lokasi Anda: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
          ambilCuaca(lat, lon, "Lokasi Anda Saat Ini");
          btnLokasi.textContent = "📍 Gunakan Lokasi Saya Saat Ini";
        },
        () => {
          alert("Gagal mendapatkan lokasi. Pastikan Anda mengizinkan akses GPS.");
          btnLokasi.textContent = "📍 Gunakan Lokasi Saya Saat Ini";
        }
      );
    });

    // Cari berdasarkan nama lokasi
    btnCari.addEventListener('click', async () => {
      const query = inputLokasi.value.trim();
      if (!query) return alert("Masukkan nama kota atau alamat!");

      cuacaDiv.innerHTML = `<div class="loading">🔍 Mencari lokasi...</div>`;

      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`
        );
        const data = await res.json();

        if (data && data.length > 0) {
          const { lat, lon, display_name } = data[0];
          infoKoordinat.innerHTML = `📍 ${display_name}`;
          ambilCuaca(parseFloat(lat), parseFloat(lon), display_name);
        } else {
          cuacaDiv.innerHTML = `<p style="color:orange;">❓ Lokasi tidak ditemukan.</p>`;
        }
      } catch (e) {
        cuacaDiv.innerHTML = `<p style="color:red;">❌ Gagal mencari lokasi.</p>`;
      }
    });

    // Tekan Enter di input
    inputLokasi.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') btnCari.click();
    });
  </script>
</body>
</html>
